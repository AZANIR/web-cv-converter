services:
  cvc-backend:
    build:
      context: ./repo/backend
      dockerfile: Dockerfile
    container_name: cvc-backend
    restart: unless-stopped
    env_file:
      - ./repo/backend/.env
    volumes:
      - ./repo/backend/fonts:/app/fonts:ro
      - ./repo/backend/assets:/app/assets:ro
      - ./repo/backend/styles.json:/app/styles.json:ro
      - ./repo/backend/cv_to_json_prompt.md:/app/cv_to_json_prompt.md:ro
      - ./repo/backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - web

  cvc-frontend:
    build:
      context: ./repo/frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_URL: https://cvc.valtive.io
    container_name: cvc-frontend
    restart: unless-stopped
    env_file:
      - ./repo/frontend/.env.production
    environment:
      NUXT_API_BASE_SERVER: http://cvc-backend:8000
      NUXT_PUBLIC_API_URL: https://cvc.valtive.io
    depends_on:
      cvc-backend:
        condition: service_healthy
    networks:
      - web

networks:
  web:
    external: true
