name: Deploy production (Hetzner)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-production.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /opt/docker/cvc/repo
            git fetch origin
            git reset --hard origin/main
            cd /opt/docker
            docker compose -f docker-compose.yml -f ./cvc/repo/docker-compose.hetzner.yml build cvc-backend cvc-frontend
            docker compose -f docker-compose.yml -f ./cvc/repo/docker-compose.hetzner.yml up -d cvc-backend cvc-frontend
